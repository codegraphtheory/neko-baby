model:
  provider: openai-codex
  default: gpt-5.5
  model: gpt-5.5
  base_url: https://chatgpt.com/backend-api/codex
toolsets:
- file
- terminal
- skills
- web
- session_search
- clarify
- todo
agent:
  max_turns: 90
  tool_use_enforcement: true
terminal:
  backend: local
  cwd: .
compression:
  enabled: true
display:
  tool_progress: true
  skin: neko-baby
memory:
  memory_enabled: true
  user_profile_enabled: true
security:
  redact_secrets: true
approvals:
  mode: manual
